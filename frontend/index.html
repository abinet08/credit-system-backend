<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit System | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-center mb-6">Credit Scoring System</h1>
        <div id="auth-container">
            <div class="mb-4">
                <label class="block text-gray-700">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600">
            </div>
            <div class="flex gap-4">
                <button id="loginBtn" class="flex-1 bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">Login</button>
                <button id="registerBtn" class="flex-1 bg-gray-600 text-white py-2 rounded-lg hover:bg-gray-700 transition">Register</button>
            </div>
            <div id="message" class="mt-4 text-center text-red-500"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
