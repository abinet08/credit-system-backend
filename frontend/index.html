<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreditScope | Smart Credit Scoring</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        .animated-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 200% 200%;
            animation: gradientShift 8s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .input-focus:focus {
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.3);
            transform: scale(1.01);
            transition: all 0.2s;
        }
    </style>
</head>
<body class="animated-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass-card rounded-2xl p-8 w-full max-w-md text-white">
        <div class="text-center mb-8">
            <div class="text-5xl mb-3">📊</div>
            <h1 class="text-3xl font-bold">Credit<span class="text-purple-300">Scope</span></h1>
            <p class="text-purple-200 mt-2">Intelligent credit scoring system</p>
        </div>
        <div id="auth-container">
            <div class="mb-5">
                <label class="block text-sm font-medium mb-2">Username</label>
                <input type="text" id="username" class="input-focus w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none" placeholder="Enter your username">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" class="input-focus w-full px-4 py-3 rounded-xl bg-white/20 border border-white/30 text-white placeholder-white/60 focus:outline-none" placeholder="••••••••">
            </div>
            <div class="flex gap-4">
                <button id="loginBtn" class="flex-1 bg-white text-purple-700 font-semibold py-3 rounded-xl hover:bg-purple-100 transition transform hover:scale-[1.02]">Login</button>
                <button id="registerBtn" class="flex-1 bg-purple-600 text-white font-semibold py-3 rounded-xl hover:bg-purple-700 transition transform hover:scale-[1.02]">Register</button>
            </div>
            <div id="message" class="mt-4 text-center text-sm text-yellow-200"></div>
        </div>
        <div class="mt-8 text-center text-xs text-white/50">
            Demo admin: admin / admin123
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
