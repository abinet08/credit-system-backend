<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between">
        <h1 class="text-xl font-bold">Admin Panel</h1>
        <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1 rounded">Logout</button>
    </nav>
    <div class="container mx-auto p-6">
        <div class="bg-white rounded shadow overflow-hidden">
            <table class="min-w-full">
                <thead class="bg-gray-200">
                    <tr><th class="p-3 text-left">ID</th><th>Username</th><th>Admin</th><th>Latest Credit Score</th></tr>
                </thead>
                <tbody id="userTable"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
