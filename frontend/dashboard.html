<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CreditScope</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f3f4f6; }
        .score-gauge {
            background: conic-gradient(from 0deg, #10b981 0deg, #fbbf24 180deg, #ef4444 360deg);
            border-radius: 50%;
            position: relative;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .card-hover {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
        }
        .factor-bar {
            transition: width 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeInUp 0.6s ease-out;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="glass-nav fixed top-0 w-full z-50 shadow-sm">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">📈</span>
                <span class="font-bold text-xl text-gray-800">Credit<span class="text-purple-600">Scope</span></span>
            </div>
            <div class="flex items-center space-x-4">
                <span id="userName" class="text-gray-700 font-medium"></span>
                <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-full text-sm font-medium transition shadow-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 pt-24 pb-12">
        <!-- Score Overview -->
        <div class="grid md:grid-cols-3 gap-6 mb-8 animate-fade-up">
            <!-- Main Score Card -->
            <div class="md:col-span-1 bg-white rounded-2xl shadow-lg p-6 card-hover">
                <div class="text-center">
                    <h2 class="text-gray-500 uppercase tracking-wider text-sm">Your Credit Score</h2>
                    <div class="relative inline-block my-4">
                        <svg class="w-44 h-44 transform -rotate-90">
                            <circle cx="88" cy="88" r="80" stroke="#e5e7eb" stroke-width="12" fill="none" />
                            <circle id="scoreArc" cx="88" cy="88" r="80" stroke="url(#gradient)" stroke-width="12" fill="none" stroke-dasharray="502" stroke-dashoffset="502" />
                            <defs>
                                <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#ef4444" />
                                    <stop offset="50%" stop-color="#fbbf24" />
                                    <stop offset="100%" stop-color="#10b981" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span id="scoreValue" class="text-5xl font-bold text-gray-800">---</span>
                            <span id="scoreRating" class="text-sm font-medium px-3 py-1 rounded-full bg-gray-100 mt-2"></span>
                        </div>
                    </div>
                    <div class="mt-2 text-xs text-gray-400">Range: 300 – 850</div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="md:col-span-2 grid grid-cols-2 gap-4">
                <div class="bg-white rounded-2xl shadow-lg p-5 card-hover">
                    <div class="text-3xl mb-2">⏱️</div>
                    <div class="text-2xl font-bold text-gray-800" id="creditAge">--</div>
                    <div class="text-gray-500 text-sm">Avg. Credit Age</div>
                </div>
                <div class="bg-white rounded-2xl shadow-lg p-5 card-hover">
                    <div class="text-3xl mb-2">💳</div>
                    <div class="text-2xl font-bold text-gray-800" id="utilization">--</div>
                    <div class="text-gray-500 text-sm">Credit Utilization</div>
                </div>
                <div class="bg-white rounded-2xl shadow-lg p-5 card-hover">
                    <div class="text-3xl mb-2">📅</div>
                    <div class="text-2xl font-bold text-gray-800" id="paymentHistory">--</div>
                    <div class="text-gray-500 text-sm">Payment History</div>
                </div>
                <div class="bg-white rounded-2xl shadow-lg p-5 card-hover">
                    <div class="text-3xl mb-2">🔍</div>
                    <div class="text-2xl font-bold text-gray-800" id="inquiries">--</div>
                    <div class="text-gray-500 text-sm">Recent Inquiries</div>
                </div>
            </div>
        </div>

        <!-- Factor Breakdown -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 card-hover animate-fade-up" style="animation-delay: 0.1s;">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📊 Factor Breakdown</h2>
            <div id="factorsList" class="space-y-4"></div>
        </div>

        <!-- Update Form -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-8 card-hover animate-fade-up" style="animation-delay: 0.2s;">
            <h2 class="text-xl font-bold text-gray-800 mb-4">✏️ Simulate Changes</h2>
            <p class="text-gray-500 text-sm mb-5">Adjust these values to see how your score changes (like paying down debt or opening new credit).</p>
            <form id="updateForm" class="grid md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Payment History (%)</label>
                    <input type="number" id="payment_history" class="mt-1 w-full border-gray-300 rounded-xl p-2 focus:ring-purple-500 focus:border-purple-500" step="1" min="0" max="100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Credit Utilization (%)</label>
                    <input type="number" id="utilization" class="mt-1 w-full border-gray-300 rounded-xl p-2 focus:ring-purple-500 focus:border-purple-500" step="1" min="0" max="100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Avg Credit Age (years)</label>
                    <input type="number" id="credit_age_years" class="mt-1 w-full border-gray-300 rounded-xl p-2 focus:ring-purple-500 focus:border-purple-500" step="0.5" min="0">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Credit Mix Score (0-100)</label>
                    <input type="number" id="credit_mix_score" class="mt-1 w-full border-gray-300 rounded-xl p-2 focus:ring-purple-500 focus:border-purple-500" step="1" min="0" max="100">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">New Credit Inquiries</label>
                    <input type="number" id="new_credit_inquiries" class="mt-1 w-full border-gray-300 rounded-xl p-2 focus:ring-purple-500 focus:border-purple-500" step="1" min="0">
                </div>
                <div class="flex items-end">
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-semibold py-2 rounded-xl hover:shadow-lg transition transform hover:scale-[1.02]">Recalculate Score →</button>
                </div>
            </form>
        </div>

        <!-- Score History Chart -->
        <div class="bg-white rounded-2xl shadow-lg p-6 card-hover animate-fade-up" style="animation-delay: 0.3s;">
            <h2 class="text-xl font-bold text-gray-800 mb-4">📈 Score History</h2>
            <canvas id="historyChart" height="100"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
