<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Credit System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .score-circle { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-purple-700">Credit System</h1>
        <div>
            <span id="userName" class="mr-4"></span>
            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-1 rounded hover:bg-red-600">Logout</button>
        </div>
    </nav>
    <div class="container mx-auto p-6">
        <div class="grid md:grid-cols-3 gap-6">
            <!-- Score Card -->
            <div class="bg-white rounded-lg shadow p-6 text-center md:col-span-1">
                <h2 class="text-gray-500 uppercase text-sm">Your Credit Score</h2>
                <div class="text-6xl font-bold my-4" id="scoreValue">---</div>
                <div class="text-xl font-semibold" id="scoreRating"></div>
                <div class="mt-4 w-full bg-gray-200 rounded-full h-2.5">
                    <div id="scoreBar" class="bg-purple-600 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <!-- Quick factors -->
            <div class="bg-white rounded-lg shadow p-6 md:col-span-2">
                <h2 class="text-xl font-bold mb-4">Score Factors Breakdown</h2>
                <div id="factorsList" class="space-y-3"></div>
            </div>
        </div>
        <!-- Update form -->
        <div class="bg-white rounded-lg shadow p-6 mt-6">
            <h2 class="text-xl font-bold mb-4">Update Your Credit Profile (Simulate changes)</h2>
            <form id="updateForm" class="grid md:grid-cols-2 gap-4">
                <div><label>Payment History (0-100%)</label><input type="number" id="payment_history" class="w-full border rounded p-2" step="1"></div>
                <div><label>Credit Utilization (0-100%)</label><input type="number" id="utilization" class="w-full border rounded p-2" step="1"></div>
                <div><label>Avg Credit Age (years)</label><input type="number" id="credit_age_years" class="w-full border rounded p-2" step="0.5"></div>
                <div><label>Credit Mix Score (0-100)</label><input type="number" id="credit_mix_score" class="w-full border rounded p-2" step="1"></div>
                <div><label>New Credit Inquiries (last 12m)</label><input type="number" id="new_credit_inquiries" class="w-full border rounded p-2" step="1"></div>
                <div class="md:col-span-2"><button type="submit" class="bg-purple-600 text-white px-6 py-2 rounded hover:bg-purple-700">Recalculate Score</button></div>
            </form>
        </div>
        <!-- History chart -->
        <div class="bg-white rounded-lg shadow p-6 mt-6">
            <h2 class="text-xl font-bold mb-4">Score History (Last 7 records)</h2>
            <canvas id="historyChart" height="100"></canvas>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
